<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anesthesia Procedure Reference</title>
<style>
  /* ============================================================
     ANESTHESIA PROCEDURE REFERENCE
     Editorial-clinical aesthetic: calm, high-legibility, fast scan.
     Data lives in the PROCEDURES array near the bottom of this file.
     ============================================================ */

  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --ink: #1a1d21;
    --ink-soft: #3d434b;
    --ink-faint: #6b727c;
    --paper: #f6f4ef;
    --paper-2: #fffefb;
    --line: #ddd8cd;
    --line-soft: #e9e5db;
    --accent: #8a3324;          /* oxblood — section/heading accent */
    --accent-soft: #b5573f;
    --teal: #1f5f5b;            /* anesthesia pillar */
    --gold: #9a7320;           /* surgical pillar */
    --slate: #3b5168;          /* physiology pillar */
    --rose: #8a4250;           /* comorbidity pillar */
    --flag-bg: #fbeee9;
    --flag-border: #d9a99a;
    --radius: 4px;
    --shadow: 0 1px 2px rgba(26,29,33,0.04), 0 6px 22px rgba(26,29,33,0.06);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --serif: 'Newsreader', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(rgba(138,51,36,0.025) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; position: relative; z-index: 1; }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    background: var(--paper-2);
    border-right: 1px solid var(--line);
    padding: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .brand { padding: 26px 24px 18px; border-bottom: 1px solid var(--line-soft); }
  .brand .kicker {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 7px;
  }
  .brand h1 {
    font-family: var(--serif); font-weight: 500; font-size: 23px;
    line-height: 1.12; letter-spacing: -0.01em; color: var(--ink);
  }
  .brand .sub { font-size: 12px; color: var(--ink-faint); margin-top: 6px; }

  .search-wrap { padding: 16px 20px 12px; border-bottom: 1px solid var(--line-soft); }
  #search {
    width: 100%; padding: 9px 12px; border: 1px solid var(--line);
    border-radius: var(--radius); font-family: var(--sans); font-size: 13.5px;
    background: var(--paper); color: var(--ink); transition: border-color .15s, box-shadow .15s;
  }
  #search:focus { outline: none; border-color: var(--accent-soft); box-shadow: 0 0 0 3px rgba(138,51,36,0.08); background: #fff; }
  #search::placeholder { color: var(--ink-faint); }

  .nav { padding: 8px 0 24px; flex: 1; }
  .nav-section { margin-top: 2px; }
  .nav-section-head {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-faint); padding: 11px 22px 11px 18px; display: flex; align-items: center; gap: 8px;
    width: 100%; background: none; border: none; cursor: pointer; text-align: left;
    transition: color .12s, background .12s;
  }
  .nav-section-head:hover { color: var(--ink); background: var(--paper); }
  .nav-section-head.is-best { color: var(--accent); }
  .nav-section-head.is-best .nsh-count { color: var(--accent); border-color: var(--accent-soft); }
  .nsh-caret { font-size: 9px; color: var(--ink-faint); transition: transform .18s; transform: rotate(90deg); display: inline-block; width: 9px; }
  .nav-section.collapsed .nsh-caret { transform: rotate(0deg); }
  .nsh-label { flex: 1; }
  .nsh-count { font-size: 10px; color: var(--ink-faint); background: var(--paper); border: 1px solid var(--line-soft); border-radius: 999px; padding: 1px 7px; letter-spacing: 0; }
  .nav-section-items { overflow: hidden; }
  .nav-section.collapsed .nav-section-items { display: none; }
  .nav-item {
    display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    padding: 8px 24px 8px 30px; font-family: var(--sans); font-size: 13.5px; color: var(--ink-soft);
    border-left: 2px solid transparent; transition: background .12s, color .12s, border-color .12s; line-height: 1.3;
  }
  .nav-item:hover { background: var(--paper); color: var(--ink); }
  .nav-item.active { background: var(--flag-bg); color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
  .nav-item .ni-sub { display: block; font-size: 11px; color: var(--ink-faint); margin-top: 1px; }
  .nav-item.active .ni-sub { color: var(--accent-soft); }
  .nav-empty { padding: 14px 24px; font-size: 12.5px; color: var(--ink-faint); font-style: italic; }

  /* ---------- MAIN ---------- */
  .main { padding: 0; position: relative; }
  .main-inner { max-width: 880px; margin: 0 auto; padding: 40px 56px 120px; }

  /* welcome / empty state */
  .welcome { padding-top: 28px; }
  .welcome .kicker { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .welcome h2 { font-family: var(--serif); font-weight: 500; font-size: 38px; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 18px; max-width: 18ch; }
  .welcome p { font-size: 15px; color: var(--ink-soft); max-width: 60ch; margin-bottom: 14px; line-height: 1.6; }
  .welcome .pillars { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-top: 30px; max-width: 620px; }
  .pillar-card { border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; background: var(--paper-2); }
  .pillar-card .pc-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
  .pillar-card h4 { font-size: 13.5px; font-weight: 600; display: inline; vertical-align: middle; }
  .pillar-card p { font-size: 12.5px; color: var(--ink-faint); margin-top: 8px; margin-bottom: 0; }
  .welcome .stat-row { margin-top: 32px; display: flex; gap: 32px; padding-top: 22px; border-top: 1px solid var(--line-soft); }
  .stat .num { font-family: var(--serif); font-size: 30px; color: var(--accent); line-height: 1; }
  .stat .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-top: 6px; }

  /* minimal landing prompt + how-to button + build stamp */
  .welcome-prompt { font-size: 15px; color: var(--ink-faint); }
  .howto-btn {
    margin-top: 30px; background: none; border: 1px solid var(--line); border-radius: var(--radius);
    padding: 9px 16px; font-family: var(--sans); font-size: 13px; color: var(--ink-soft); cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .howto-btn:hover { background: var(--paper-2); color: var(--accent); border-color: var(--accent-soft); }
  .build-stamp { margin-top: 26px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--ink-faint); opacity: 0.7; }

  /* How-to overlay panel */
  .howto-panel {
    position: fixed; inset: 0; background: rgba(26,29,33,0.4); z-index: 80;
    display: none; align-items: flex-start; justify-content: center; padding: 6vh 18px 18px; overflow-y: auto;
  }
  .howto-panel.open { display: flex; }
  .howto-card {
    background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow);
    max-width: 680px; width: 100%; padding: 32px 34px 28px; position: relative; animation: fade .25s ease;
  }
  .howto-card .kicker { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .howto-card h2 { font-family: var(--serif); font-weight: 500; font-size: 28px; line-height: 1.12; letter-spacing: -0.02em; margin-bottom: 16px; }
  .howto-card p { font-size: 14.5px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 14px; }
  .howto-card .pillars { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin: 20px 0; }
  .howto-card .howto-foot { font-size: 12px; color: var(--ink-faint); border-top: 1px solid var(--line-soft); padding-top: 14px; margin-top: 18px; }
  .howto-close {
    position: absolute; top: 16px; right: 18px; background: none; border: none; font-size: 26px;
    line-height: 1; color: var(--ink-faint); cursor: pointer; padding: 2px 6px;
  }
  .howto-close:hover { color: var(--accent); }
  @media (max-width: 560px){ .howto-card .pillars { grid-template-columns: 1fr; } .howto-card { padding: 26px 22px; } }

  /* ---------- PROCEDURE VIEW ---------- */
  .proc { animation: fade .35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .proc-head { border-bottom: 2px solid var(--ink); padding-bottom: 18px; margin-bottom: 8px; }
  .proc-breadcrumb { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 12px; }
  .proc-breadcrumb b { color: var(--accent); }
  .proc-head h2 { font-family: var(--serif); font-weight: 500; font-size: 34px; line-height: 1.08; letter-spacing: -0.02em; }
  .proc-tags { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 7px; }
  .tag { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; padding: 4px 9px; border-radius: 100px; background: var(--paper-2); border: 1px solid var(--line); color: var(--ink-soft); }
  .tag.anes { border-color: rgba(31,95,91,0.3); color: var(--teal); background: rgba(31,95,91,0.05); }

  .snapshot { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 0; margin: 24px 0 8px; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; background: var(--paper-2); }
  .snap-cell { padding: 12px 14px; border-right: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
  .snap-cell .sc-lbl { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); }
  .snap-cell .sc-val { font-size: 13.5px; font-weight: 500; color: var(--ink); margin-top: 3px; line-height: 1.25; }

  /* flag / key-concern banner */
  .flags { margin: 26px 0 6px; }
  .flag {
    display: flex; gap: 12px; align-items: flex-start; padding: 13px 16px; border: 1px solid var(--flag-border);
    background: var(--flag-bg); border-radius: var(--radius); margin-bottom: 9px;
  }
  .flag .fi { font-family: var(--serif); font-style: italic; font-weight: 600; color: var(--accent); flex-shrink: 0; font-size: 18px; line-height: 1.3; width: 16px; text-align: center; }
  .flag .ft { font-size: 13.5px; color: var(--ink); line-height: 1.45; }
  .flag .ft b { color: var(--accent); }

  /* section pillars */
  .section { margin-top: 38px; }
  .section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; padding-bottom: 9px; border-bottom: 1px solid var(--line); }
  .section-head .bar { width: 26px; height: 3px; border-radius: 2px; align-self: center; }
  .section-head h3 { font-family: var(--serif); font-weight: 600; font-size: 19px; letter-spacing: -0.01em; }
  .section-head .pill-tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-left: auto; }

  .section p { font-size: 14.5px; color: var(--ink-soft); margin-bottom: 13px; line-height: 1.62; }
  .section p b, .section li b { color: var(--ink); font-weight: 600; }
  .section ul { list-style: none; margin: 4px 0 14px; }
  .section li { font-size: 14px; color: var(--ink-soft); padding: 5px 0 5px 22px; position: relative; line-height: 1.55; }
  .section li::before { content: "—"; position: absolute; left: 0; color: var(--accent-soft); font-weight: 600; }

  /* phase blocks (pre/intra/post) */
  .phases { display: grid; gap: 12px; }
  .phase { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; background: var(--paper-2); }
  .phase-head { padding: 9px 16px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; font-weight: 500; }
  .phase-body { padding: 13px 16px 6px; }
  .phase-body ul { margin-bottom: 8px; }
  .phase-pre .phase-head { background: var(--slate); }
  .phase-intra .phase-head { background: var(--accent); }
  .phase-post .phase-head { background: var(--teal); }

  .source-note { margin-top: 44px; padding-top: 16px; border-top: 1px solid var(--line-soft); font-size: 11.5px; color: var(--ink-faint); font-family: var(--mono); line-height: 1.5; }

  /* Across the Drapes — surgeon's-eye view (Surgical Recall content). Distinct from the four
     anesthesia pillars: a bordered aside in the surgical-gold tone, clearly secondary. */
  .drapes { margin-top: 38px; border: 1px solid var(--line); border-left: 3px solid var(--gold); border-radius: var(--radius); background: var(--paper-2); padding: 0; overflow: hidden; }
  .drapes-head { display: flex; align-items: baseline; gap: 10px; padding: 11px 18px; border-bottom: 1px solid var(--line-soft); background: rgba(154,115,32,0.06); }
  .drapes-head h3 { font-family: var(--serif); font-weight: 600; font-size: 17px; letter-spacing: -0.01em; color: var(--ink); }
  .drapes-head .pill-tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-left: auto; }
  .drapes-body { padding: 14px 18px 6px; }
  .drapes-group { margin-bottom: 14px; }
  .drapes-group:last-child { margin-bottom: 6px; }
  .drapes-group .dg-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 7px; }
  .drapes-body ul { margin: 0 0 4px; padding-left: 18px; }
  .drapes-body li { font-size: 13.5px; color: var(--ink); line-height: 1.5; margin-bottom: 6px; }
  .drapes-body li b { color: var(--gold); }

  .topbar-mobile { display: none; }

  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: fixed; left: 0; top: 0; width: 86%; max-width: 340px; height: 100%; transform: translateX(-100%); transition: transform .25s; z-index: 60; box-shadow: var(--shadow); background: var(--paper-2); -webkit-overflow-scrolling: touch; }
    .sidebar.open { transform: none; }
    .topbar-mobile { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--line); background: var(--paper-2); position: sticky; top: 0; z-index: 40; }
    .topbar-mobile button { background: none; border: 1px solid var(--line); border-radius: var(--radius); padding: 7px 11px; font-size: 18px; cursor: pointer; line-height: 1; }
    .topbar-mobile .tb-title { font-family: var(--serif); font-size: 17px; font-weight: 500; }
    .main-inner { padding: 26px 22px 90px; }
    .welcome h2 { font-size: 28px; }
    .welcome .pillars { grid-template-columns: 1fr; }
    .proc-head h2 { font-size: 26px; }
    /* scrim dims the content while the drawer is open; sits below the sidebar (z 55 < 60).
       The .app stacking-context trap is removed on mobile (below) so this ordering holds. */
    .scrim { position: fixed; inset: 0; background: rgba(26,29,33,0.35); z-index: 55; }
    .app { z-index: auto; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="kicker">Clinical Reference</div>
      <h1>Anesthesia&nbsp;Procedure Reference</h1>
      <div class="sub">Surgical technique &amp; anesthetic management, by procedure</div>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search procedures, e.g. ‘open globe’, ‘OCR’…" autocomplete="off">
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <main class="main">
    <div class="topbar-mobile">
      <button id="menuBtn" aria-label="Open menu">☰</button>
      <span class="tb-title">Procedure Reference</span>
    </div>
    <div class="main-inner" id="content"></div>
  </main>
</div>

<script>
/* ============================================================
   DATA MODEL
   Each procedure object:
   {
     id, name, section, sectionPage, page,
     tags: [..],                         // quick descriptors + anesthetic technique
     snapshot: { position, time, ebl, painScore, anesthesia, mortality },
     flags: [ "…key concern…" ],         // the can't-miss items, bolded inline with **
     technique: { summary, steps: [..] },
     physiology: [ "…", "…" ],
     comorbid: [ "…", "…" ],
     phases: { pre: [..], intra: [..], post: [..] },
     source: "…"
   }
   Bold inline text with **double asterisks**.
   ============================================================ */

const PROCEDURES = [
  {
    id: "cataract",
    name: "Cataract Extraction with IOL Insertion",
    section: "Ophthalmic Surgery",
    page: "144",
    tags: ["Topical / intracameral", "MAC", "Outpatient", "Elderly"],
    snapshot: { position: "Supine, table rotated 90–180°", time: "15–60 min", ebl: "None", painScore: "1–2", anesthesia: "Topical ± MAC", mortality: "Rare" },
    flags: [
      "Most cases use **topical anesthesia only** (preservative-free lidocaine 2–4%); iris/ciliary anesthesia depends on LA penetrating the anterior chamber.",
      "**Antiplatelet/anticoagulant drugs generally do NOT need to be stopped** before cataract surgery (especially if INR ≤ 1.5).",
      "Lack of akinesia with topical → requires a **highly cooperative patient**. All LA techniques are contraindicated with uncontrolled movement disorders or inability to cooperate."
    ],
    technique: {
      summary: "Opacified crystalline lens removed via the extracapsular technique through an opening in the anterior capsule (capsulectomy), most commonly by phacoemulsification through a clear corneal incision <3 mm. Posterior capsular bag is left intact to support a foldable IOL.",
      steps: [
        "Clear corneal incision (~2.8 mm phaco) or 8–10 mm corneoscleral incision for intact nuclear delivery.",
        "Capsulectomy → phacoemulsification fragments the nucleus with ultrasound → aspiration of lens material.",
        "Peripheral cortical material aspirated, posterior capsular bag preserved.",
        "Foldable IOL (silicon/acrylic) inserted into the bag; if capsule unable to support, sutured posterior-chamber or anterior-chamber IOL.",
        "Watertight closure with 9-0/10-0 nylon or Vicryl, or self-sealing small wound."
      ]
    },
    physiology: [
      "Surgery is intraocular but very short with no blood loss — physiologic stress is low; the dominant concern is **patient stillness and cooperation** under topical anesthesia.",
      "IV sedation paradoxically **increases** adverse events vs topical-only; over-sedation risks sudden movement when roused.",
      "Excessive IV fluids → bladder distention → HTN and agitation mid-case."
    ],
    comorbid: [
      "Overwhelmingly an **elderly population** (prevalence 50% at 65–74 yo, 70% at 75+ yo) → multiple coexisting illnesses; thorough preop H&P mandatory even for MAC.",
      "Cardiovascular disease, diabetes, HTN are common; congenital cataract associated with **Marfan's** and metabolic disorders.",
      "Diabetics: silent ischemia risk and gastroparesis/aspiration risk."
    ],
    phases: {
      pre: [
        "Detailed explanation of events (IV, monitors, block, face drape, supplemental O2) plus reassurance the anesthesiologist is always present.",
        "Midazolam 0.5–1 mg IV often beneficial.",
        "Aspiration risk (hiatal hernia, gastroparesis) or very anxious/obese: metoclopramide 10 mg IV."
      ],
      intra: [
        "MAC; topical anesthesia placed by ophthalmologist.",
        "If a block is placed, very short-acting agents (remifentanil 0.25–1 mcg/kg, alfentanil 5–7 mcg/kg, or propofol 30–50 mg) to cover injection pain — be prepared for sudden ↓BP and apnea.",
        "**FiO2 < 0.3** with open O2 delivery if cautery may be used (fire hazard).",
        "Remain in verbal contact; avoid evoking head movement."
      ],
      post: [
        "Acetaminophen 325–1000 mg PO.",
        "PONV: ondansetron 4 mg IV.",
        "Watch for myocardial ischemia, corneal abrasion, photophobia."
      ]
    },
    source: "Jaffe 5e (2014), Ophthalmic Surgery §2.0, p. 144–146; MAC considerations p. 158–161."
  },
  {
    id: "corneal-transplant",
    name: "Corneal Transplant (Penetrating Keratoplasty)",
    section: "Ophthalmic Surgery",
    page: "146",
    tags: ["GA or regional block", "Open globe", "Topical if cooperative"],
    snapshot: { position: "Supine, rotated 90–180°", time: "60–90 min", ebl: "Minimal", painScore: "2", anesthesia: "GA or retro/peribulbar", mortality: "Rare" },
    flags: [
      "**Open-globe precautions once the eye is opened**: absolutely avoid patient movement, coughing, bucking, or Valsalva → expulsion of intraocular contents.",
      "Commonly **GA or a retrobulbar/peribulbar block** to prevent eyelid/EOM movement distorting the globe. Topical reserved for cooperative patients when injection/GA is undesirable (coagulopathy, perforated ulcer, severe systemic disease)."
    ],
    technique: {
      summary: "A portion of host cornea is replaced with donor allograft to restore corneal integrity and a clear visual axis. Donor button cut ~0.25 mm larger than host bed and sutured endothelial-side-down with 10-0 nylon.",
      steps: [
        "Scleral fixation (Flieringa) ring placed for scleral support (esp. children, post-cataract).",
        "Donor button trephined and stored; host cornea trephined while AC maintained with viscoelastic.",
        "**Eye now open — strict immobility required.**",
        "Donor sutured in: 16 interrupted (inflamed/thinned/vascularized), running, or combination.",
        "Care to avoid endothelial trauma → primary graft failure."
      ]
    },
    physiology: [
      "Open-globe interval makes any IOP rise dangerous; smooth anesthetic with no coughing/straining is the central physiologic goal.",
      "Suprachoroidal hemorrhage risk is higher under MAC (~4%) than the <1% baseline."
    ],
    comorbid: [
      "Associated with congenital malformations, sleep apnea, atopic disease/asthma, and **Down syndrome** — relevant for airway and cooperation.",
      "Underlying etiologies: endothelial failure, inherited dystrophy, keratoconus, trauma/chemical/infectious scarring."
    ],

function mdBold(s){ return s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>'); }

/* Across the Drapes — renders the optional surgeon's-eye-view (Surgical Recall) content.
   Returns '' when p.recall is absent, so existing entries are unaffected.
   recall = { pearls:[...], mnemonics:[...], <anyCustomGroup>:[...] }
   Group order is preserved; labels are derived from the key (pearls → "Key concepts",
   mnemonics → "Mnemonics", otherwise the key is title-cased). */
const DRAPES_LABELS = { pearls: 'Key concepts', mnemonics: 'Mnemonics', pimps: 'Classic questions', anatomy: 'Anatomy' };
function drapesBlock(recall){
  if(!recall || typeof recall !== 'object') return '';
  const keys = Object.keys(recall).filter(k => Array.isArray(recall[k]) && recall[k].length);
  if(!keys.length) return '';
  const groups = keys.map(k => {
    const label = DRAPES_LABELS[k] || (k.charAt(0).toUpperCase() + k.slice(1));
    const items = recall[k].map(i => `<li>${mdBold(i)}</li>`).join("");
    return `<div class="drapes-group"><div class="dg-label">${label}</div><ul>${items}</ul></div>`;
  }).join("");
  return `
    <div class="drapes">
      <div class="drapes-head"><h3>Across the Drapes</h3><span class="pill-tag">Surgeon's-eye view</span></div>
      <div class="drapes-body">${groups}</div>
    </div>`;
}

function groupBySection(list){
  const map = {};
  list.forEach(p => { (map[p.section] = map[p.section] || []).push(p); });
  return map;
}

/* Build a fast lookup: term -> set of all sibling terms in its group(s). */
const SYNONYM_INDEX = (() => {
  const idx = {};
  SYNONYM_GROUPS.forEach(group => {
    group.forEach(term => {
      const t = term.toLowerCase();
      if(!idx[t]) idx[t] = new Set();
      group.forEach(other => idx[t].add(other.toLowerCase()));
    });
  });
  return idx;
})();

/* Expand a raw query into the query itself plus any synonym terms whose
   key is a substring of the query (or vice-versa). Returns an array of
   lowercased needles; a procedure matches if its haystack contains ANY needle. */
function expandQuery(raw){
  const q = raw.trim().toLowerCase();
  if(!q) return [];
  const needles = new Set([q]);
  // exact group hit
  if(SYNONYM_INDEX[q]) SYNONYM_INDEX[q].forEach(t => needles.add(t));
  // partial: any synonym KEY that the query contains, or that contains the query (>=3 chars)
  if(q.length >= 3){
    Object.keys(SYNONYM_INDEX).forEach(key => {
      if(q.includes(key) || key.includes(q)){
        SYNONYM_INDEX[key].forEach(t => needles.add(t));
      }
    });
  }
  return [...needles];
}

/* Sections the user has manually collapsed/expanded (overrides the default). */
const navCollapsed = {};

/* Score how directly a procedure matches the query needles.
   Higher = more direct. Name/tag hits rank above buried mentions. */
function matchScore(p, needles){
  const name = p.name.toLowerCase();
  const tags = p.tags.join(" ").toLowerCase();
  const section = p.section.toLowerCase();
  const flags = p.flags.join(" ").toLowerCase();
  const recall = p.recall ? Object.values(p.recall).flat().join(" ").toLowerCase() : "";
  const summary = p.technique.summary.toLowerCase();
  let score = 0;
  for(const n of needles){
    if(name.includes(n)) score += (name.startsWith(n) ? 120 : 100);  // name hit = strongest
    if(tags.includes(n)) score += 40;
    if(section.includes(n)) score += 25;
    if(flags.includes(n)) score += 12;
    if(recall.includes(n)) score += 10;
    if(summary.includes(n)) score += 6;
  }
  return score;
}

function renderNav(filter=""){
  const nav = document.getElementById('nav');
  const f = filter.trim().toLowerCase();
  const searching = f.length > 0;
  const needles = expandQuery(filter);     // synonym-expanded terms (empty when no query)

  let matches = PROCEDURES.filter(p => {
    if(!searching) return true;
    const hay = (p.name + " " + p.section + " " + p.tags.join(" ") + " " +
      p.flags.join(" ") + " " + p.technique.summary + " " +
      (p.recall ? Object.values(p.recall).flat().join(" ") : "")).toLowerCase();
    return needles.some(n => hay.includes(n));
  });

  if(matches.length === 0){
    nav.innerHTML = `<div class="nav-empty">No procedures match “${filter}”.</div>`;
    return;
  }

  const itemHTML = p => {
    const active = p.id === currentId ? " active" : "";
    return `<button class="nav-item${active}" data-id="${p.id}">
        ${p.name}<span class="ni-sub">p. ${p.page} · ${p.snapshot.anesthesia}</span>
      </button>`;
  };

  let html = "";

  if(searching){
    // Rank by directness. Show the strongest hits in a "Best matches" group first,
    // then the remainder grouped by section (so tangential mentions fall lower).
    const scored = matches.map(p => ({ p, s: matchScore(p, needles) }))
                          .sort((a,b) => b.s - a.s);
    const top = scored.filter(x => x.s >= 100).map(x => x.p);   // direct name-level hits
    const topIds = new Set(top.map(p => p.id));
    const rest = scored.filter(x => !topIds.has(x.p.id)).map(x => x.p);

    if(top.length){
      html += `<div class="nav-section" data-sec="__best__">
        <button class="nav-section-head is-best" data-sec="__best__">
          <span class="nsh-caret">▸</span>
          <span class="nsh-label">Best matches</span>
          <span class="nsh-count">${top.length}</span>
        </button>
        <div class="nav-section-items">${top.map(itemHTML).join("")}</div>
      </div>`;
    }
    if(rest.length){
      const restGroups = groupBySection(rest);
      Object.keys(restGroups).forEach(sec => {
        html += `<div class="nav-section" data-sec="${sec}">
          <button class="nav-section-head" data-sec="${sec}">
            <span class="nsh-caret">▸</span>
            <span class="nsh-label">${sec}</span>
            <span class="nsh-count">${restGroups[sec].length}</span>
          </button>
          <div class="nav-section-items">${restGroups[sec].map(itemHTML).join("")}</div>
        </div>`;
      });
    }
  } else {
    // No search: clean collapsible TOC, sections collapsed by default.
    const groups = groupBySection(matches);
    Object.keys(groups).forEach(sec => {
      const collapsed = (sec in navCollapsed ? navCollapsed[sec] : true);
      html += `<div class="nav-section${collapsed ? " collapsed" : ""}" data-sec="${sec}">
        <button class="nav-section-head" data-sec="${sec}">
          <span class="nsh-caret">▸</span>
          <span class="nsh-label">${sec}</span>
          <span class="nsh-count">${groups[sec].length}</span>
        </button>
        <div class="nav-section-items">${groups[sec].map(itemHTML).join("")}</div>
      </div>`;
    });
  }
  nav.innerHTML = html;

  // procedure click
  nav.querySelectorAll('.nav-item').forEach(b => {
    b.addEventListener('click', () => { selectProcedure(b.dataset.id); closeMobileNav(); });
  });
  // section header toggles collapse
  nav.querySelectorAll('.nav-section-head').forEach(h => {
    h.addEventListener('click', () => {
      const sec = h.dataset.sec;
      const wrap = nav.querySelector(`.nav-section[data-sec="${CSS.escape(sec)}"]`);
      wrap.classList.toggle('collapsed');
      if(sec !== "__best__") navCollapsed[sec] = wrap.classList.contains('collapsed');
    });
  });
}

      </div>
      <p class="howto-foot">Built primarily from <em>Jaffe's Anesthesiologist's Manual of Surgical Procedures</em> (5e, 2014), with surgeon's-eye recall from <em>Surgical Recall</em> (8e). A study/clinical-prep reference — not a substitute for the primary text or institutional protocol. Verify drug doses independently.</p>
      <div class="build-stamp">${BUILD_VERSION}</div>

function renderProcedure(p){
  const c = document.getElementById('content');
  const snap = p.snapshot;
  const snapCells = [
    ['Anesthetic', snap.anesthesia],
    ['Position', snap.position],
    ['Surgical time', snap.time],
    ['EBL', snap.ebl],
    ['Pain score', snap.painScore],
    ['Mortality', snap.mortality]
  ].map(([l,v]) => `<div class="snap-cell"><div class="sc-lbl">${l}</div><div class="sc-val">${v}</div></div>`).join("");

  const flags = p.flags.map(f => `<div class="flag"><span class="fi">!</span><span class="ft">${mdBold(f)}</span></div>`).join("");

  const techSteps = p.technique.steps.map(s => `<li>${mdBold(s)}</li>`).join("");
  const physio = p.physiology.map(s => `<li>${mdBold(s)}</li>`).join("");
  const comorbid = p.comorbid.map(s => `<li>${mdBold(s)}</li>`).join("");

  const phaseBlock = (key, cls, label, items) => `
    <div class="phase phase-${cls}">
      <div class="phase-head">${label}</div>
      <div class="phase-body"><ul>${items.map(i=>`<li>${mdBold(i)}</li>`).join("")}</ul></div>
    </div>`;

  c.innerHTML = `
    <article class="proc">
      <div class="proc-head">
        <div class="proc-breadcrumb"><b>${p.section}</b> &nbsp;·&nbsp; Jaffe p. ${p.page}</div>
        <h2>${p.name}</h2>
        <div class="proc-tags">${p.tags.map(t => `<span class="tag${/MAC|GA|GETA|block|Topical|RSI|local/i.test(t)?' anes':''}">${t}</span>`).join("")}</div>
      </div>

      <div class="snapshot">${snapCells}</div>

      <div class="flags">${flags}</div>

      <section class="section">
        <div class="section-head"><span class="bar" style="background:${PILLARS.comorbid.color}"></span><h3>${PILLARS.comorbid.label}</h3><span class="pill-tag">${PILLARS.comorbid.tag}</span></div>
        <ul>${comorbid}</ul>
      </section>

      <section class="section">
        <div class="section-head"><span class="bar" style="background:${PILLARS.technique.color}"></span><h3>${PILLARS.technique.label}</h3><span class="pill-tag">${PILLARS.technique.tag}</span></div>
        <p>${mdBold(p.technique.summary)}</p>
        <ul>${techSteps}</ul>
      </section>

      <section class="section">
        <div class="section-head"><span class="bar" style="background:${PILLARS.physiology.color}"></span><h3>${PILLARS.physiology.label}</h3><span class="pill-tag">${PILLARS.physiology.tag}</span></div>
        <ul>${physio}</ul>
      </section>

      <section class="section">
        <div class="section-head"><span class="bar" style="background:${PILLARS.phases.color}"></span><h3>${PILLARS.phases.label}</h3><span class="pill-tag">${PILLARS.phases.tag}</span></div>
        <div class="phases">
          ${phaseBlock('pre','pre','Pre-operative', p.phases.pre)}
          ${phaseBlock('intra','intra','Intra-operative', p.phases.intra)}
          ${phaseBlock('post','post','Post-operative', p.phases.post)}
        </div>
      </section>

      ${drapesBlock(p.recall)}

      <div class="source-note">Source: ${p.source}<br>This is a study/clinical-prep reference, not a substitute for the primary text or institutional protocol. Verify drug doses independently.</div>
    </article>`;
  document.querySelector('.main').scrollTop = 0;
  window.scrollTo(0,0);
}

let currentId = null;

function selectProcedure(id){
  currentId = id;
  const p = PROCEDURES.find(x => x.id === id);
  if(p){ renderProcedure(p); }
  renderNav(document.getElementById('search').value);
  if(history.replaceState){ history.replaceState(null,"","#"+id); }
}

function closeMobileNav(){
  document.getElementById('sidebar').classList.remove('open');
  const scrim = document.querySelector('.scrim'); if(scrim) scrim.remove();
}

/* init */
document.getElementById('search').addEventListener('input', e => renderNav(e.target.value));
document.getElementById('menuBtn').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  sb.classList.add('open');
  const scrim = document.createElement('div'); scrim.className = 'scrim';
  scrim.addEventListener('click', closeMobileNav);
  document.body.appendChild(scrim);
});

renderNav();
const hash = (location.hash || "").replace('#','');
if(hash && PROCEDURES.find(p => p.id === hash)){ selectProcedure(hash); }
else { renderWelcome(); }
